services:

  assistant:
    build:
      context: .
      dockerfile: AiAssistant.API/Dockerfile
    ports:
      - "5221:8080"
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      Qdrant__Host: qdrant
      Qdrant__Port: 6334
      Ollama__BaseUrl: http://ollama:11434
      # JWKS lekérés a belső Docker hálózaton keresztül
      Keycloak__Authority: http://keycloak:8080/realms/ai-assistant
      # A Postman/böngésző által kapott token iss claim-je (külső URL)
      Keycloak__TokenIssuer: http://localhost:8190/realms/ai-assistant
    depends_on:
      - qdrant
      - ollama

  keycloak:
    image: quay.io/keycloak/keycloak:26.0
    command: start-dev --import-realm
    ports:
      - "8190:8080"
    environment:
      KEYCLOAK_ADMIN: admin
      KEYCLOAK_ADMIN_PASSWORD: admin
    volumes:
      - ./keycloak/import:/opt/keycloak/data/import

  qdrant:
    image: qdrant/qdrant:latest
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant_storage:/qdrant/storage
    restart: unless-stopped

  ollama:
    image: ollama/ollama
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    restart: unless-stopped
    # Pull models on first start; subsequent starts use cached models from the volume.
    entrypoint: /bin/bash
    command: >
      -c "
      ollama serve &
      until ollama list 2>/dev/null; do sleep 2; done &&
      ollama pull llama3.2:1b || true &&
      ollama pull qwen2.5:1.5b || true &&
      ollama pull bge-m3 || true &&
      wait
      "
volumes:
  qdrant_storage:
  ollama_data:
